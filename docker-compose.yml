version: "3.9"

services:

  web:
    build: .
    container_name: ai-techblog

    command: gunicorn TechBlog.wsgi:application --bind 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    container_name: techblog-db

    restart: always

    environment:
      POSTGRES_DB: techblog
      POSTGRES_USER: techbloguser
      POSTGRES_PASSWORD: techblogpassword

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: