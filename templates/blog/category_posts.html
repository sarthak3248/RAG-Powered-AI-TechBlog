{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Category: {{ category.name }}
    </h2>

    <div class="row">

        {% for post in posts %}

        <div class="col-md-4 mb-4">

            <div class="card h-100 shadow">

                <img src="{{ post.featured_image.url }}"
                     class="card-img-top"
                     alt="{{ post.title }}">

                <div class="card-body">

                    <h5>{{ post.title }}</h5>

                    <p class="text-muted">
                        By {{ post.author }}
                    </p>

                    <p>
                        {{ post.content|truncatewords:20 }}
                    </p>

                    <a href="{% url 'post_detail' post.slug %}"
                       class="btn btn-dark">
                        Read More
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">
            <div class="alert alert-info">
                No posts found in this category.
            </div>
        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
