{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        🤖 AI Tech Assistant
    </h2>

    <div
        id="chat-box"
        class="border rounded p-3 mb-3"
        style="
            height:500px;
            overflow-y:auto;
            background:#eef2f7; 
        ">

    </div>

    <div class="input-group">

        <input
            id="user-input"
            type="text"
            class="form-control form-control-lg"
            placeholder="Ask me anything about AI or this blog...">

        <button
            id="send-button"
            class="btn btn-primary">

            🚀 Send

        </button>

    </div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
const sendButton = document.getElementById("send-button");
const userInput = document.getElementById("user-input");

sendButton.addEventListener("click", sendMessage);

userInput.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        sendMessage();

    }

});

function appendMessage(sender, message){

    const wrapper = document.createElement("div");

    wrapper.className =
        sender === "🧑 You"
        ? "text-end mb-3"
        : "text-start mb-3";

    wrapper.innerHTML = `
        <div
            class="d-inline-block p-3 rounded shadow-sm
            ${sender === "🧑 You"
                ? "bg-primary text-white"
                : "bg-white"}"
            style="max-width:75%;">
            <strong>${sender}</strong><br>
            ${message}
        </div>
    `;

    chatBox.appendChild(wrapper);

    chatBox.scrollTop = chatBox.scrollHeight;

}

function sendMessage(){

    const message = userInput.value.trim();

    if(message === "") return;

    appendMessage("🧑 You", message);

    userInput.value = "";

    sendButton.disabled = true;
    sendButton.innerHTML = "Thinking...";

    fetch("{% url 'chat_api' %}",{

        method:"POST",

        headers:{

            "Content-Type":"application/json",

            "X-CSRFToken":"{{ csrf_token }}"

        },

        body:JSON.stringify({

            message:message

        })

    })

    .then(response=>response.json())

    .then(data=>{

        appendMessage("🤖 AI", data.response);
        sendButton.disabled = false;
        sendButton.innerHTML = "🚀 Send";

    });

}

appendMessage(
    "🤖 AI",
    "Hello! I'm your AI Tech Assistant. I can answer questions about this blog or general AI topics."
);

</script>

{% endblock %}
